services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: synesthesia_eval
      POSTGRES_USER: synesthesia
      POSTGRES_PASSWORD: synesthesia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synesthesia -d synesthesia_eval"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
