# Ruff configuration for Synesthesia — scientific Python project
line-length = 120
target-version = "py314"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
    "E741",  # ambiguous variable name (common in scientific code: l, I, O)
]

[lint.per-file-ignores]
"*_poc.py" = ["F401", "F811"]  # proof-of-concept files can be messy

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
